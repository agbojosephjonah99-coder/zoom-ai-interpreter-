name: Deploy Zoom Interpreter Bot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for required env vars in code
        run: |
          echo "Checking required env vars are referenced..."
          grep -q "RECALL_API_KEY" src/bot.js && echo "✓ RECALL_API_KEY"
          grep -q "OPENAI_API_KEY" src/bot.js && echo "✓ OPENAI_API_KEY"
          grep -q "WEBHOOK_URL" src/bot.js && echo "✓ WEBHOOK_URL"

      - name: Verify server starts without crashing
        run: |
          RECALL_API_KEY=test \
          OPENAI_API_KEY=test \
          WEBHOOK_URL=https://example.com \
          PORT=3001 \
          timeout 5s node src/bot.js || [ $? -eq 124 ] && echo "✓ Server starts OK"

  # ── Deploy to Railway ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
